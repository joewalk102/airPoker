name: Frontend Tests

on:
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-tests.yml'
  push:
    branches: [ main, develop ]
    paths:
      - 'frontend/**'

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    strategy:
      matrix:
        node-version: [22.x, 24.x, 26.x]

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install dependencies
      run: |
        cd frontend
        npm ci

    - name: Run tests
      run: |
        cd frontend
        npm test -- --reporter=verbose

    - name: Generate coverage report
      run: |
        cd frontend
        npm test -- --coverage
      if: matrix.node-version == '26.x'

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        files: ./frontend/coverage/coverage-final.json
        flags: frontend
        name: frontend-coverage
      if: matrix.node-version == '26.x' && always()

    - name: Archive test results
      uses: actions/upload-artifact@v7
      if: always()
      with:
        name: test-results-node-${{ matrix.node-version }}
        path: |
          frontend/coverage/
          frontend/test-results/

    - name: Comment PR with test results
      uses: actions/github-script@v7
      if: always() && matrix.node-version == '26.x'
      with:
        script: |
          const testStatus = '${{ job.status }}';
          const comment = `## Frontend Tests ${testStatus === 'success' ? '✅' : '❌'}
          
          **Test status:** ${testStatus.toUpperCase()}
          
          - Node.js: 22.x, 24.x, 26.x
          - React
          - Vitest
          
          [View workflow details](${context.payload.pull_request.html_url}/checks)`;
          
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: comment
          });
