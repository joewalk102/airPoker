name: Code Quality

on:
  pull_request:
    branches: [ main, develop ]
  push:
    branches: [ main, develop ]

jobs:
  backend-lint:
    name: Backend Code Quality
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        cd backend
        python -m pip install --upgrade pip
        pip install flake8 black isort

    - name: Check formatting with Black
      run: |
        cd backend
        black --check --diff poker/ config/ || true

    - name: Check import sorting with isort
      run: |
        cd backend
        isort --check-only --diff poker/ config/ || true

    - name: Lint with Flake8
      run: |
        cd backend
        # Stop the build if there are Python syntax errors or undefined names
        flake8 poker/ config/ --count --select=E9,F63,F7,F82 --show-source --statistics
        # exit-zero treats all errors as warnings
        flake8 poker/ config/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics || true

  frontend-lint:
    name: Frontend Code Quality
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install dependencies
      run: |
        cd frontend
        npm ci

    - name: Check code with ESLint
      run: |
        cd frontend
        npx eslint src/ --ext .js,.jsx --max-warnings=0 || true

    - name: Check formatting with Prettier (would be optional)
      run: |
        cd frontend
        npx prettier --check src/ --log-level=warn || true

  security-scan:
    name: Security Vulnerability Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Check backend dependencies for vulnerabilities
      run: |
        cd backend
        python -m pip install --upgrade pip
        pip install bandit safety
        # Run bandit for security issues
        bandit -r poker/ config/ -ll || true
        # Check for known vulnerabilities in dependencies
        pip install -r requirements.txt
        safety check --json || true

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'

    - name: Check frontend dependencies for vulnerabilities
      run: |
        cd frontend
        npm ci
        npm audit --production --audit-level=moderate || true

